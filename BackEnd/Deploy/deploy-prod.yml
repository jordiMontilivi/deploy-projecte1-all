name: Deploy Backend a PROD (EC2 Bare Metal)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixant el codi del repositori
        uses: actions/checkout@v4 

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      # PROFESSIONAL: A Producció compilem les dependències al Runner (GitHub)
      # Això assegura que si Composer falla, el desplegament s'atura abans de tocar el servidor
      - name: Construir Vendor de Producció
        run: |
          composer install --no-dev --optimize-autoloader --no-progress

      - name: Configurar SSH manualment
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.EC2_SSH_KEY_PROD }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ vars.EC2_HOST_PROD }} >> ~/.ssh/known_hosts

      # Pugem el codi INCLOENT la carpeta vendor, però excloent var i fitxers de dev
      - name: Desplegar Artefacte amb RSYNC
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'var/' \
            --exclude 'tests/' \
            ./ ${{ vars.EC2_USER }}@${{ vars.EC2_HOST_PROD }}:/var/www/backend/

      - name: Executar comandes de Producció via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST_PROD }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            cd /var/www/backend

            # 1. Generar la caché de Symfony optimitzada
            APP_ENV=prod php bin/console cache:clear
            
            # 2. Re-aplicar permisos per si s'han creat nous fitxers
            sudo setfacl -R -m u:www-data:rwX -m u:ubuntu:rwX var/
            sudo setfacl -dR -m u:www-data:rwX -m u:ubuntu:rwX var/

            # 3. Executar migracions a la BD RDS
            APP_ENV=prod php bin/console doctrine:migrations:migrate --no-interaction
            
            # 4. Optimització de memòria d'escriptura de PHP (Opcional però professional)
            APP_ENV=prod php bin/console opcache:clear || true