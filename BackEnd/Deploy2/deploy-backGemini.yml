name: Deploy Backend (DEV & PROD)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]
  workflow_dispatch:

# Definim variables globals que canvien segons la branca que dispara l'acció
env:
  TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
  TARGET_ROLE: ${{ github.ref == 'refs/heads/main' && 'backend' || 'all' }}
  TARGET_HOST: ${{ github.ref == 'refs/heads/main' && vars.EC2_HOST_PROD || vars.EC2_HOST }}
  TARGET_KEY: ${{ github.ref == 'refs/heads/main' && secrets.EC2_SSH_KEY_PROD || secrets.EC2_SSH_KEY }}
  TARGET_USER: ${{ vars.EC2_USER }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar el codi del repositori
        uses: actions/checkout@v4

      # --- BLOC DE COMPILACIÓ (NOMÉS PROD) ---
      - name: 2. Setup PHP (Només PROD)
        if: github.ref == 'refs/heads/main'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      # --- BLOC DE CACHE DE COMPOSER (PROD ONLY) ---
      - name: 3. Cache Composer dependencies
        if: github.ref == 'refs/heads/main'
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      # --- BLOC DE BUILD COMPOSER (PROD ONLY) ---
      - name: 4. Construir Vendor (Només PROD)
        if: github.ref == 'refs/heads/main'
        run: APP_ENV=prod composer install --no-dev --optimize-autoloader --no-progress --no-interaction

      # --- BLOC DE PREPARACIÓ DEL SERVIDOR (COMPARTIT) - SSH CONFIG ---
      - name: 5. Configurar SSH i Known Hosts manualment
        run: |
          mkdir -p ~/.ssh/
          echo "${{ env.TARGET_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ env.TARGET_HOST }} >> ~/.ssh/known_hosts

      # --- BLOC DE PROVISIONING DEL SERVIDOR (COMPARTIT) ---
      # Pugem script i mirem si el servidor ja està provisionat. Si no ho està, executem l'script que instal·la Apache, PHP i altres eines bàsiques.
      - name: 6. Provisionar servidor base (Idempotent)
        run: |
          scp ./full-setup.sh ${{ env.TARGET_USER }}@${{ env.TARGET_HOST }}:/home/${{ env.TARGET_USER }}/full-setup.sh
          sh ${{ env.TARGET_USER }}@${{ env.TARGET_HOST }} "chmod +x full-setup.sh && sudo bash full-setup.sh ${{ env.TARGET_ENV }} ${{ env.TARGET_ROLE }} && rm -f full-setup.sh"

      # --- BLOC DE SINCRONITZACIÓ (BIFURCAT) ---
      - name: 7A. Sincronitzar fitxers RSYNC (DEV)
        if: github.ref == 'refs/heads/develop'
        run: |
          rsync -avz --delete-delay \
            --exclude '.git/' --exclude '.github/' \
            --exclude 'var/' --exclude 'vendor/' \
            --exclude '.env.local' --exclude 'full-setup.sh' \
            ./ ${{ env.TARGET_USER }}@${{ env.TARGET_HOST }}:/var/www/backend/

      - name: 7B. Sincronitzar fitxers RSYNC (PROD)
        if: github.ref == 'refs/heads/main'
        run: |
          rsync -avz --delete-delay \
            --exclude '.git/' --exclude '.github/' \
            --exclude 'var/' --exclude 'tests/' \
            --exclude 'full-setup.sh' \
            --exclude 'config/secrets/prod/prod.decrypt.private.php' \ # <-- Excloem la clau privada de Symfony perquè RSYNC no l'esborre
            ./ ${{ env.TARGET_USER }}@${{ env.TARGET_HOST }}:/var/www/backend/
            # Hem afegit l'exclusió de la clau privada de Symfony perquè RSYNC no l'esborri!

      # --- BLOC DE POST-DESPLEGAMENT SYMFONY (BIFURCAT) ---
      - name: 8. Executar tasques Symfony post-desplegament
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          key: ${{ env.TARGET_KEY }}
          script: |

            echo " Deploy Symfony (${{ env.TARGET_ENV }})"

            cd /var/www/backend

            if [ "${{ env.TARGET_ENV }}" = "dev" ]; then

                echo " DEV setup"

                export COMPOSER_ALLOW_SUPERUSER=1
                composer install --optimize-autoloader

                php bin/console cache:clear --env=dev

                php bin/console doctrine:migrations:migrate \
                    --allow-no-migration \
                    --no-interaction

            else

                echo " PROD optimization"

                APP_ENV=prod php bin/console cache:clear --no-debug
                APP_ENV=prod php bin/console cache:warmup

                APP_ENV=prod php bin/console doctrine:migrations:migrate \
                    --allow-no-migration \
                    --no-interaction

                # Opcional si tens bundle opcache
                APP_ENV=prod php bin/console opcache:clear || true

            fi

            echo " Fixing permissions"

            sudo setfacl -R -m u:www-data:rwX -m u:${{ env.TARGET_USER }}:rwX var/
            sudo setfacl -dR -m u:www-data:rwX -m u:${{ env.TARGET_USER }}:rwX var/

            echo " Reload Apache"
            sudo systemctl reload apache2

            echo " Deploy completat"
