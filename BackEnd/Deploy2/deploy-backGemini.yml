name: Deploy Backend (DEV & PROD)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]
  workflow_dispatch:

# Definim variables globals que canvien segons la branca que dispara l'acció
env:
  TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
  TARGET_ROLE: ${{ github.ref == 'refs/heads/main' && 'backend' || 'all' }}
  TARGET_HOST: ${{ github.ref == 'refs/heads/main' && vars.EC2_HOST_PROD || vars.EC2_HOST }}
  TARGET_KEY: ${{ github.ref == 'refs/heads/main' && secrets.EC2_SSH_KEY_PROD || secrets.EC2_SSH_KEY }}
  TARGET_USER: ${{ vars.EC2_USER }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar el codi del repositori
        uses: actions/checkout@v4

      # --- BLOC DE COMPILACIÓ (NOMÉS PROD) ---
      - name: 2. Setup PHP (Només PROD)
        if: github.ref == 'refs/heads/main'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      # COMPOSER CACHE
      - name: 3. Cache Composer dependencies
        if: github.ref == 'refs/heads/main'
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: 3. Construir Vendor (Només PROD)
        if: github.ref == 'refs/heads/main'
        run: APP_ENV=prod composer install --no-dev --optimize-autoloader --no-progress --no-interaction

      # --- BLOC DE PREPARACIÓ DEL SERVIDOR (COMPARTIT) ---
      - name: 4. Configurar SSH i Known Hosts manualment
        run: |
          mkdir -p ~/.ssh/
          echo "${{ env.TARGET_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.TARGET_HOST }} >> ~/.ssh/known_hosts

      - name: 5. Provisionar servidor base (Idempotent)
        run: |
          scp ./full-setup.sh ${{ env.TARGET_USER }}@${{ env.TARGET_HOST }}:/home/${{ env.TARGET_USER }}/full-setup.sh
          ssh ${{ env.TARGET_USER }}@${{ env.TARGET_HOST }} "chmod +x full-setup.sh && sudo bash full-setup.sh ${{ env.TARGET_ENV }} ${{ env.TARGET_ROLE }}; rm -f full-setup.sh"

      # --- BLOC DE SINCRONITZACIÓ (BIFURCAT) ---
      - name: 6A. Sincronitzar fitxers RSYNC (DEV)
        if: github.ref == 'refs/heads/develop'
        run: |
          rsync -avz --delete-delay \
            --exclude '.git/' --exclude '.github/' \
            --exclude 'var/' --exclude 'vendor/' \
            --exclude '.env.local' --exclude 'full-setup.sh' \
            ./ ${{ env.TARGET_USER }}@${{ env.TARGET_HOST }}:/var/www/backend/

      - name: 6B. Sincronitzar fitxers RSYNC (PROD)
        if: github.ref == 'refs/heads/main'
        run: |
          rsync -avz --delete-delay \
            --exclude '.git/' --exclude '.github/' \
            --exclude 'var/' --exclude 'tests/' \
            --exclude 'full-setup.sh' \
            --exclude 'config/secrets/prod/prod.decrypt.private.php' \
            ./ ${{ env.TARGET_USER }}@${{ env.TARGET_HOST }}:/var/www/backend/
            # Hem afegit l'exclusió de la clau privada de Symfony perquè RSYNC no l'esborri!

      # --- BLOC DE POST-DESPLEGAMENT SYMFONY (BIFURCAT) ---
      - name: 7. Executar tasques Symfony post-desplegament
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          key: ${{ env.TARGET_KEY }}
          script: |
            echo " Iniciant post-desplegament de Symfony per a l'entorn: ${{ env.TARGET_ENV }}"
            cd /var/www/backend

            if [ "${{ env.TARGET_ENV }}" == "dev" ]; then
                echo " Aplicant configuracions exclusives de DEV..."
                export COMPOSER_ALLOW_SUPERUSER=1
                APP_ENV=dev composer install --optimize-autoloader
                
                APP_ENV=dev php bin/console cache:clear
                # Hem tret el || true. Si falla la BD, volem saber-ho!
                APP_ENV=dev php bin/console doctrine:migrations:migrate --allow-no-migration --no-interaction
            else
                echo " Aplicant configuracions exclusives de PROD..."
                
                echo "1. Netejant la cau perquè Doctrine detecti les noves entitats..."
                APP_ENV=prod php bin/console cache:clear --no-warmup

                echo "2. Executant migracions de Producció..."
                # Hem tret el || true. El pipeline fallarà si l'SQL té errors.
                APP_ENV=prod php bin/console doctrine:migrations:migrate --allow-no-migration --no-interaction
                
                echo "3. Generant la cau optimitzada per a Producció..."
                APP_ENV=prod php bin/console cache:warmup
                
                # Optimització opcional d'Opcache
                APP_ENV=prod php bin/console opcache:clear || true
            fi

            echo " Re-aplicant permisos a la carpeta var/..."
            sudo setfacl -R -m u:www-data:rwX -m u:${{ env.TARGET_USER }}:rwX var/
            sudo setfacl -dR -m u:www-data:rwX -m u:${{ env.TARGET_USER }}:rwX var/

            echo " Desplegament finalitzat amb èxit!"
