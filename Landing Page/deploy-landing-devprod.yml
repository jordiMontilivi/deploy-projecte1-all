name: deploy landingPage to S3 CloudFront main and develop
# He tractat de fer un desplegament el mĂ©s genĂ¨ric possible per a que serveixi tant per a la branca de desenvolupament com per a la de producciĂł,
# nomĂ©s canviant les variables d'entorn segons la branca. AixĂ­ evitem tenir dos workflows ja que son prĂ cticament idĂ¨ntics i mantenim tot mĂ©s net.

on:
  push:
    branches: ["main", "develop"] # Es dispara en pujar codi a qualsevol de les dues branques (No seria el desitjat segons gitflow perĂ˛ aixĂ­ es pot provar el workflow a develop abans de fer el merge a main)
  pull_request:
    branches: ["develop"] # TambĂ© quan es vol integrar codi a develop des d'una branca de feature
  workflow_dispatch: # Permet l'execuciĂł manual des d'un "boto" 'Actions'

jobs:
  deploy:
    runs-on: ubuntu-latest # Utilitzem una mĂ quina virtual Linux gestionada per GitHub

    # DEFINICIĂ“ DE VARIABLES D'ENTORN DINĂ€MIQUES MIG "INVENT" PER PODER USAR EL MATEIX WORKFLOW PER A DEV I PROD
    # AcĂ­ fem la "mĂ gia" per decidir a quin bucket anem segons la branca actual
    env:
      # TernĂ ria: Si la branca Ă©s 'main', usa el bucket de PROD; si no, el de DEV
      CURRENT_S3_BUCKET: ${{ github.ref == 'refs/heads/main' && vars.S3_BUCKET_NAME_PROD || vars.S3_BUCKET_NAME_DEV }}
      # El mateix per a la distribuciĂł de CloudFront (he posat les dues formes que he trobat per detectar la branca per a veure diferents formes i ja trieu vosaltres)
      CURRENT_CF_ID: ${{ github.ref_name == 'main' && vars.CLOUDFRONT_ID_PROD || vars.CLOUDFRONT_ID_DEV }}
      AWS_REGION: ${{ vars.AWS_REGION }}

    steps:
      # 1. Copiem el codi del repositori a la mĂ quina virtual del runner
      - name: Checkout del codi
        uses: actions/checkout@v4 # en alguns deploys utilitzava v6 perĂ˛ he llegit que v4 es el mĂ©s estable i compatible...

      # 2. Configurem les credencials d'AWS (Molt important actualitzar-les cada cop que obrim el Lab d'Academy)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Pugem els fitxers a S3
      # El flag --delete esborra al S3 el que ja no existeix localment per mantenir-ho net
      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ env.CURRENT_S3_BUCKET }} --delete --exclude ".git/*" --exclude ".github/*"

      # 4. Invalidem la memĂ˛ria cau de CloudFront (NomĂ©s si la variable tĂ© valor)
      # Comprovem si la variable env.CURRENT_CF_ID no estĂ  buida abans d'executar la comanda d'invalidaciĂł, aixĂ­ evitem errors si per alguna raĂł no s'ha configurat correctament el CloudFront id.
      - name: Invalidate CloudFront cache
        if: env.CURRENT_CF_ID != ''
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.CURRENT_CF_ID }} --paths "/*"
